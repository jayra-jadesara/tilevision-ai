name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows (PyInstaller + Inno Setup)
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision.spec --clean --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/tilevision_setup.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-windows
          path: |
            dist/TileVisionAI/
            dist/installer/*.exe
          retention-days: 14

  build-macos:
    name: macOS (.app, Intel x64)
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # x64 build runs on Intel Macs natively and on Apple Silicon via Rosetta.
      # GitHub's default arm64-only build breaks Intel showrooms (Core i5/i7/i9).
      - name: Set up Python 3.12 (x64)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: x64
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision_mac.spec --clean --noconfirm

      - name: Verify Mac app is Intel x64 (works on client Intel iMacs)
        run: |
          BIN="dist/TileVisionAI.app/Contents/MacOS/TileVisionAI"
          file "$BIN"
          file "$BIN" | grep -E "x86_64|i386"

      - name: Create macOS DMG
        run: |
          hdiutil create -volname "TileVision AI" -srcfolder dist/TileVisionAI.app \
            -ov -format UDZO dist/TileVisionAI-macOS.dmg

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-macos
          path: |
            dist/TileVisionAI-macOS.dmg
            dist/TileVisionAI.app
          retention-days: 14

  release:
    name: Publish GitHub Release + update manifest
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-windows
          path: release/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-macos
          path: release/macos

      - name: Prepare release files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          WIN_EXE=$(find release/windows -name "*.exe" | head -n 1)
          MAC_DMG=$(find release/macos -name "*.dmg" | head -n 1)
          cp "$WIN_EXE" "TileVisionAI-Setup-${VERSION}.exe"
          cp "$MAC_DMG" "TileVisionAI-macOS-${VERSION}.dmg"
          ls -lh TileVisionAI-*

      - name: Generate update manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/generate_update_manifest.py \
            "$VERSION" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/TileVisionAI-Setup-${VERSION}.exe" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/TileVisionAI-macOS-${VERSION}.dmg" \
            "TileVision AI ${GITHUB_REF_NAME} — see release notes on GitHub." \
            > update_manifest.json
          cat update_manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TileVision AI ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            TileVisionAI-Setup-*.exe
            TileVisionAI-macOS-*.dmg
            update_manifest.json

  build-linux:
    name: Linux (binary)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libegl1 libglib2.0-0

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision_linux.spec --clean --noconfirm

      - name: Create Linux tarball
        run: |
          tar -czf TileVisionAI-Linux.tar.gz -C dist TileVisionAI

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-linux
          path: TileVisionAI-Linux.tar.gz
          retention-days: 14
