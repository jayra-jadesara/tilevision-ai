name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Windows — fully self-contained ─────────────────────────────────────────
  build-windows:
    name: Windows (PyInstaller + Inno Setup)
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Validate build config
        run: python scripts/validate_ci_build.py

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-v2-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision.spec --clean --noconfirm

      - name: Verify Windows bundle
        shell: pwsh
        run: ./scripts/verify_frozen_windows.ps1

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/tilevision_setup.iss

      - name: Verify Windows installer (silent install)
        shell: pwsh
        run: |
          $installer = Get-ChildItem dist/installer/*.exe | Select-Object -First 1
          $target = Join-Path $env:RUNNER_TEMP "tilevision-install-test"
          Remove-Item $target -Recurse -Force -ErrorAction SilentlyContinue
          $proc = Start-Process -FilePath $installer.FullName -ArgumentList @(
            "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART", "/DIR=$target"
          ) -Wait -PassThru
          if ($proc.ExitCode -ne 0) { throw "Installer failed with exit code $($proc.ExitCode)" }
          ./scripts/verify_frozen_windows.ps1 -AppDir $target

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-windows
          path: dist/installer/*.exe
          retention-days: 14

      - name: Upload Windows app folder (debug)
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-windows-app
          path: dist/TileVisionAI/
          retention-days: 3

  # ─── macOS Intel — native x86_64 runner (no Rosetta) ───────────────────────
  build-macos-intel:
    name: macOS Intel (x86_64)
    runs-on: macos-15-intel
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Validate build config
        run: python3 scripts/validate_ci_build.py

      - name: Set up Python 3.12
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-v2-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies (Intel x86_64)
        shell: bash
        env:
          PYTHON_SETUP_PATH: ${{ steps.setup-python.outputs.python-path }}
        run: |
          set -euo pipefail
          source scripts/install_mac_deps.sh x64
          echo "MACOS_BUILD_ARCH=$MACOS_BUILD_ARCH" >> "$GITHUB_ENV"
          echo "MACOS_PYTHON_PATH=$MACOS_PYTHON_PATH" >> "$GITHUB_ENV"

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/macos_build_python.sh scripts/download_dinov2_model.py

      - name: Verify DINOv2 weights present
        shell: bash
        run: test -f model_weights/dinov2-large/config.json

      - name: Verify native libraries (x86_64)
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          OMP_NUM_THREADS: "1"
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: bash scripts/verify_mac_native_libs.sh x86_64

      - name: Build with PyInstaller
        shell: bash
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: bash scripts/macos_build_python.sh -m PyInstaller packaging/tilevision_mac.spec --clean --noconfirm

      - name: Verify frozen Mac app
        run: bash scripts/verify_frozen_mac_app.sh dist/TileVisionAI.app x86_64

      - name: Create macOS DMG
        run: |
          hdiutil create -volname "TileVision AI (Intel)" -srcfolder dist/TileVisionAI.app \
            -ov -format UDZO dist/TileVisionAI-macOS-Intel.dmg

      - name: Upload macOS Intel artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-macos-intel
          path: dist/TileVisionAI-macOS-Intel.dmg
          retention-days: 14

  # ─── macOS Apple Silicon — fully self-contained ─────────────────────────────
  build-macos-arm64:
    name: macOS Apple Silicon (arm64)
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Validate build config
        run: python3 scripts/validate_ci_build.py

      - name: Set up Python 3.12 (arm64)
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: arm64

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-v2-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies (Apple Silicon arm64)
        shell: bash
        env:
          PYTHON_SETUP_PATH: ${{ steps.setup-python.outputs.python-path }}
        run: |
          set -euo pipefail
          source scripts/install_mac_deps.sh arm64
          echo "MACOS_BUILD_ARCH=$MACOS_BUILD_ARCH" >> "$GITHUB_ENV"
          echo "MACOS_PYTHON_PATH=$MACOS_PYTHON_PATH" >> "$GITHUB_ENV"

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        shell: bash
        run: bash scripts/macos_build_python.sh scripts/download_dinov2_model.py

      - name: Verify DINOv2 weights present
        shell: bash
        run: test -f model_weights/dinov2-large/config.json

      - name: Verify native libraries (arm64)
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
          OMP_NUM_THREADS: "1"
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: bash scripts/verify_mac_native_libs.sh arm64

      - name: Build with PyInstaller
        shell: bash
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: bash scripts/macos_build_python.sh -m PyInstaller packaging/tilevision_mac.spec --clean --noconfirm

      - name: Verify frozen Mac app
        run: bash scripts/verify_frozen_mac_app.sh dist/TileVisionAI.app arm64

      - name: Create macOS DMG
        run: |
          hdiutil create -volname "TileVision AI (Apple Silicon)" -srcfolder dist/TileVisionAI.app \
            -ov -format UDZO dist/TileVisionAI-macOS-AppleSilicon.dmg

      - name: Upload macOS Apple Silicon artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-macos-arm64
          path: dist/TileVisionAI-macOS-AppleSilicon.dmg
          retention-days: 14

  # ─── Linux — fully self-contained ───────────────────────────────────────────
  build-linux:
    name: Linux (binary)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Validate build config
        run: python3 scripts/validate_ci_build.py

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libegl1 libglib2.0-0

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-v2-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision_linux.spec --clean --noconfirm

      - name: Create Linux tarball
        run: tar -czf TileVisionAI-Linux.tar.gz -C dist TileVisionAI

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-linux
          path: TileVisionAI-Linux.tar.gz
          retention-days: 14

  # ─── Release — only collects artifacts after all builds finish ──────────────
  release:
    name: Publish GitHub Release + update manifest
    needs: [build-windows, build-macos-intel, build-macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches tag
        shell: bash
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          APP_VER="$(grep '^APP_VERSION' src/version.py | cut -d'"' -f2)"
          ISS_VER="$(grep '#define MyAppVersion' packaging/tilevision_setup.iss | cut -d'"' -f2)"
          echo "tag=$TAG_VER app=$APP_VER inno=$ISS_VER"
          test "$TAG_VER" = "$APP_VER"
          test "$TAG_VER" = "$ISS_VER"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-windows
          path: release/windows

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-macos-intel
          path: release/macos-intel

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-macos-arm64
          path: release/macos-arm64

      - name: Prepare release files
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          WIN_EXE=$(find release/windows -name "TileVisionAI-Setup-*.exe" | head -n 1)
          INTEL_DMG=$(find release/macos-intel -name "*.dmg" | head -n 1)
          ARM_DMG=$(find release/macos-arm64 -name "*.dmg" | head -n 1)

          if [ -z "$WIN_EXE" ] || [ -z "$INTEL_DMG" ] || [ -z "$ARM_DMG" ]; then
            echo "ERROR: missing release artifact (win=$WIN_EXE intel=$INTEL_DMG arm=$ARM_DMG)" >&2
            find release -type f | head -50
            exit 1
          fi

          cp "$WIN_EXE" "TileVisionAI-Setup-${VERSION}.exe"
          cp "$INTEL_DMG" "TileVisionAI-macOS-Intel-${VERSION}.dmg"
          cp "$ARM_DMG" "TileVisionAI-macOS-AppleSilicon-${VERSION}.dmg"
          cp packaging/MAC_INSTALL.txt "TileVisionAI-macOS-READ-ME-FIRST.txt"

          # GitHub hard limit: 2147483648 bytes (2 GiB) per release asset.
          GH_MAX=2147483648
          SAFE_MAX=$((GH_MAX - 32 * 1024 * 1024))
          for f in TileVisionAI-*; do
            size=$(stat -c%s "$f")
            echo "$(numfmt --to=iec-i --suffix=B "$size")  $f"
            if [ "$size" -ge "$GH_MAX" ]; then
              echo "ERROR: $f is $size bytes — exceeds GitHub limit $GH_MAX" >&2
              exit 1
            fi
            if [ "$size" -gt "$SAFE_MAX" ]; then
              echo "ERROR: $f is too close to GitHub 2 GiB limit ($size > $SAFE_MAX)" >&2
              exit 1
            fi
          done

      - name: Generate update manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          python scripts/generate_update_manifest.py \
            "$VERSION" \
            "${BASE}/TileVisionAI-Setup-${VERSION}.exe" \
            "${BASE}/TileVisionAI-macOS-Intel-${VERSION}.dmg" \
            "${BASE}/TileVisionAI-macOS-AppleSilicon-${VERSION}.dmg" \
            "TileVision AI ${GITHUB_REF_NAME} - separate Intel and Apple Silicon Mac installers." \
            > update_manifest.json
          cat update_manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TileVision AI ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          replace: true
          body: |
            ## Mac customers — all models supported

            Download the **correct .dmg** for your Mac (each file is under GitHub's 2 GB limit):

            | File | For |
            |------|-----|
            | **TileVisionAI-macOS-Intel-*.dmg** | Intel iMac / Intel MacBook (Core i5, i7, i9) |
            | **TileVisionAI-macOS-AppleSilicon-*.dmg** | M1, M2, M3, M4 Macs |
            | **TileVisionAI-macOS-READ-ME-FIRST.txt** | Quick guide — how to pick the right file |

            First launch: Right-click app → **Open** → **Open**
          files: |
            TileVisionAI-Setup-*.exe
            TileVisionAI-macOS-Intel-*.dmg
            TileVisionAI-macOS-AppleSilicon-*.dmg
            TileVisionAI-macOS-READ-ME-FIRST.txt
            update_manifest.json
