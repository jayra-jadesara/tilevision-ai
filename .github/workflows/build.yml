name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-model:
    name: Download DINOv2 model (shared cache)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: pip install -r requirements.txt

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

  build-windows:
    name: Windows (PyInstaller + Inno Setup)
    needs: prepare-model
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision.spec --clean --noconfirm

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/tilevision_setup.iss

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-windows
          path: |
            dist/TileVisionAI/
            dist/installer/*.exe
          retention-days: 14

  build-macos:
    name: macOS (${{ matrix.label }})
    needs: prepare-model
    runs-on: macos-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            label: Intel
            artifact: tilevision-macos-intel
            dmg: TileVisionAI-macOS-Intel.dmg
            verify: x86_64
          - arch: arm64
            label: Apple Silicon
            artifact: tilevision-macos-arm64
            dmg: TileVisionAI-macOS-AppleSilicon.dmg
            verify: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12 (${{ matrix.arch }})
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch }}
          # Do not share pip cache between arm64 and x64 — wheels are arch-specific.
          cache: false

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Create isolated venv and install dependencies
        shell: bash
        run: |
          set -euo pipefail
          PY="${{ steps.setup-python.outputs.python-path }}"
          VENV=".venv-macos-${{ matrix.arch }}"
          echo "Using setup-python at: $PY"
          file "$PY"

          if [ "${{ matrix.arch }}" = "x64" ]; then
            arch -x86_64 "$PY" -m venv "$VENV"
            RUN="arch -x86_64 $VENV/bin/python"
          else
            "$PY" -m venv "$VENV"
            RUN="$VENV/bin/python"
          fi

          $RUN -m pip install --upgrade pip
          $RUN -m pip install --no-cache-dir -r requirements.txt pyinstaller
          echo "MACOS_PYTHON=$RUN" >> "$GITHUB_ENV"
          echo "MACOS_VENV=$VENV" >> "$GITHUB_ENV"

      - name: Verify native libraries match target architecture
        shell: bash
        run: |
          set -euo pipefail
          $MACOS_PYTHON -c "import platform; print('python:', platform.machine())"
          if [ "${{ matrix.arch }}" = "x64" ]; then
            $MACOS_PYTHON -c "import platform; assert platform.machine() in ('x86_64', 'AMD64'), platform.machine()"
          else
            $MACOS_PYTHON -c "import platform; assert platform.machine() == 'arm64', platform.machine()"
          fi

          RUST_SO="$(find "$MACOS_VENV" -name '_rust.abi3.so' | head -n 1)"
          echo "cryptography native lib: $RUST_SO"
          file "$RUST_SO"
          file "$RUST_SO" | grep -q "${{ matrix.verify }}"

      - name: Build with PyInstaller
        shell: bash
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: $MACOS_PYTHON -m PyInstaller packaging/tilevision_mac.spec --clean --noconfirm

      - name: Verify Mac app architecture (${{ matrix.label }})
        run: |
          BIN="dist/TileVisionAI.app/Contents/MacOS/TileVisionAI"
          file "$BIN"
          file "$BIN" | grep -q "${{ matrix.verify }}"

      - name: Create macOS DMG
        run: |
          hdiutil create -volname "TileVision AI (${{ matrix.label }})" -srcfolder dist/TileVisionAI.app \
            -ov -format UDZO "dist/${{ matrix.dmg }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.dmg }}
          retention-days: 14

  release:
    name: Publish GitHub Release + update manifest
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-windows
          path: release/windows

      - name: Download macOS Intel artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-macos-intel
          path: release/macos-intel

      - name: Download macOS Apple Silicon artifact
        uses: actions/download-artifact@v4
        with:
          name: tilevision-macos-arm64
          path: release/macos-arm64

      - name: Prepare release files
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          WIN_EXE=$(find release/windows -name "*.exe" | head -n 1)
          INTEL_DMG=$(find release/macos-intel -name "*.dmg" | head -n 1)
          ARM_DMG=$(find release/macos-arm64 -name "*.dmg" | head -n 1)

          cp "$WIN_EXE" "TileVisionAI-Setup-${VERSION}.exe"
          cp "$INTEL_DMG" "TileVisionAI-macOS-Intel-${VERSION}.dmg"
          cp "$ARM_DMG" "TileVisionAI-macOS-AppleSilicon-${VERSION}.dmg"

          bash scripts/package_mac_universal.sh \
            "TileVisionAI-macOS-Intel-${VERSION}.dmg" \
            "TileVisionAI-macOS-AppleSilicon-${VERSION}.dmg" \
            "TileVisionAI-macOS-${VERSION}.zip"

          ls -lh TileVisionAI-*

      - name: Generate update manifest
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python scripts/generate_update_manifest.py \
            "$VERSION" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/TileVisionAI-Setup-${VERSION}.exe" \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/TileVisionAI-macOS-${VERSION}.zip" \
            "TileVision AI ${GITHUB_REF_NAME} — Intel and Apple Silicon Mac builds included." \
            > update_manifest.json
          cat update_manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: TileVision AI ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Mac customers — all models supported

            Download **TileVisionAI-macOS-*.zip** from this release. It contains:
            - **Intel .dmg** — Intel iMac / Intel MacBook (Core i5, i7, i9)
            - **Apple Silicon .dmg** — M1, M2, M3, M4 Macs
            - **READ ME FIRST.txt** — tells customer which file to open
          files: |
            TileVisionAI-Setup-*.exe
            TileVisionAI-macOS-Intel-*.dmg
            TileVisionAI-macOS-AppleSilicon-*.dmg
            TileVisionAI-macOS-*.zip
            update_manifest.json

  build-linux:
    name: Linux (binary)
    needs: prepare-model
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Linux Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-xinerama0 libxkbcommon-x11-0 libegl1 libglib2.0-0

      - name: Cache DINOv2 model weights
        id: model-cache
        uses: actions/cache@v4
        with:
          path: model_weights/dinov2-large
          key: dinov2-large-${{ hashFiles('scripts/download_dinov2_model.py') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download DINOv2 weights
        if: steps.model-cache.outputs.cache-hit != 'true'
        run: python scripts/download_dinov2_model.py

      - name: Build with PyInstaller
        env:
          TILEVISION_OFFLINE_MODEL: "1"
        run: pyinstaller packaging/tilevision_linux.spec --clean --noconfirm

      - name: Create Linux tarball
        run: |
          tar -czf TileVisionAI-Linux.tar.gz -C dist TileVisionAI

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: tilevision-linux
          path: TileVisionAI-Linux.tar.gz
          retention-days: 14
